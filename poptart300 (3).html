<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pop-Tart 300 Visualizer</title>

<!-- SheetJS -->
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<!-- html2canvas for screenshots -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<!-- jsPDF for PDFs -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
  body { background:#111; color:#eee; font-family:Arial; padding:20px; }
  h1,h2 { text-align:center; }
  h1 { color:#ff9800; }
  h2 { color:#90caf9; font-weight:normal; }

  #dropzone {
    border:2px dashed #666; padding:30px; text-align:center;
    margin:20px auto; width:60%; border-radius:10px; color:#bbb;
  }
  #dropzone:hover { border-color:#ff9800; color:#ff9800; }

  .input-container { max-width:400px; margin:20px auto; display:flex; gap:8px; }
  select { flex:1; padding:8px; background:#222; color:#fff; border:1px solid #444; border-radius:4px; }
  button { padding:8px 14px; background:#ff9800; border:none; border-radius:4px; font-weight:bold; cursor:pointer; }
  button:hover { background:#ffa726; }

  .chart-container {
    max-width:900px; margin:30px auto; background:#1c1c1c;
    border-radius:10px; padding:20px 25px 30px; display:none;
  }

  .exercise-row { margin-bottom:18px; }
  .exercise-label { display:flex; justify-content:space-between; margin-bottom:6px; }
  .bars { display:flex; gap:6px; align-items:flex-end; height:120px; background:#121212; padding:6px; border-radius:6px; }
  .bar { flex:1; border-radius:4px 4px 0 0; display:flex; align-items:flex-end; justify-content:center; color:#fff; font-size:0.7rem; }
  .date1 { background:#ef5350; }
  .date2 { background:#42a5f5; }
  .date3 { background:#66bb6a; }

  table { width:100%; border-collapse:collapse; margin-top:25px; }
  th,td { border:1px solid #333; padding:6px; text-align:center; }
  th { background:#263238; }
  .highlight { color:#ffeb3b; font-weight:bold; }

  #message { text-align:center; margin-top:20px; color:#ffeb3b; }

  .legend { display:flex; gap:10px; margin-top:10px; flex-wrap:wrap; }
  .legend-item { display:flex; align-items:center; gap:5px; font-size:0.8rem; }
  .legend-color { width:14px; height:14px; border-radius:3px; }
  .legend-color.date1 { background:#ef5350; }
  .legend-color.date2 { background:#42a5f5; }
  .legend-color.date3 { background:#66bb6a; }
</style>
</head>

<body>

<h1>Pop-Tart 300</h1>
<h2>Excel‑Powered Improvement Visualizer</h2>

<div id="dropzone">Drop your Pop‑Tart 300 Excel file here</div>

<div class="input-container">
  <select id="participantSelect">
    <option value="">-- Select Participant --</option>
  </select>
  <button onclick="showParticipant()">Go</button>
</div>

<div style="text-align:center; margin-top:10px;">
  <button onclick="downloadSinglePaxPDF()">Download This PAX as PDF</button>
</div>

<div style="text-align:center; margin-top:10px;">
  <button onclick="showAllPax()">Show Improvement for All PAX</button>
</div>

<div style="text-align:center; margin-top:10px;">
  <button onclick="downloadAllPaxPDF()">Download All Charts as PDF</button>
</div>

<div style="text-align:center; margin-top:10px;">
  <button onclick="showMostImproved()">Most Improved PAX</button>
</div>

<div id="message"></div>

<div id="chart" class="chart-container">
  <h2 id="chartTitle"></h2>
  <div id="chartContent"></div>
  <div id="legend" class="legend"></div>
  <div id="tableContainer"></div>
</div>

<div id="allPaxContainer"></div>
<div id="mostImprovedContainer"></div>

<script>
let participants = {};

document.getElementById("dropzone").addEventListener("dragover", e => {
  e.preventDefault();
});
document.getElementById("dropzone").addEventListener("drop", e => {
  e.preventDefault();
  const file = e.dataTransfer.files[0];
  readExcel(file);
});

function excelDateToJSDate(serial) {
  return new Date((serial - 25569) * 86400 * 1000);
}

function readExcel(file) {
  const reader = new FileReader();
  reader.onload = e => {
    const data = new Uint8Array(e.target.result);
    const workbook = XLSX.read(data, { type: "array" });
    const sheet = workbook.Sheets[workbook.SheetNames[0]];

    // Start at row 2 (range:1) so row 2 is header, row 3+ is data
    const rows = XLSX.utils.sheet_to_json(sheet, { header: 1, range: 1 });

    const header = rows[0];

    const col = {
      date: header.indexOf("Date"),
      name: header.indexOf("F3 Name"),
      hrm: header.indexOf("HRM Total") !== -1 ? header.indexOf("HRM Total") : header.indexOf("Hand Release Merkins"),
      ts: header.indexOf("TS Total"),
      bbsu: header.indexOf("BBSU Total"),
      ohp: header.indexOf("OHP Total"),
      run: header.indexOf("200s Total")
    };

    participants = {};

    for (let i = 1; i < rows.length; i++) {
      const r = rows[i];
      const name = (r[col.name] || "").toString().trim().toLowerCase();
      if (!name) continue;

      const dateRaw = r[col.date];
      const date = typeof dateRaw === "number"
        ? excelDateToJSDate(dateRaw).toLocaleDateString()
        : dateRaw;

      const hrm = r[col.hrm];
      const ts = r[col.ts];
      const bbsu = r[col.bbsu];
      const ohp = r[col.ohp];
      const run = r[col.run];

      if (!participants[name]) {
        participants[name] = {
          name: r[col.name],
          dates: [],
          exercises: { "HRM": [], "TS": [], "BBSU": [], "OHP": [], "200m Run": [] }
        };
      }

      participants[name].dates.push(date);
      participants[name].exercises["HRM"].push(hrm);
      participants[name].exercises["TS"].push(ts);
      participants[name].exercises["BBSU"].push(bbsu);
      participants[name].exercises["OHP"].push(ohp);
      participants[name].exercises["200m Run"].push(run);
    }

    populateDropdown();
    document.getElementById("dropzone").innerHTML = "Excel loaded successfully!";
  };
  reader.readAsArrayBuffer(file);
}

function populateDropdown() {
  const dropdown = document.getElementById("participantSelect");
  dropdown.innerHTML = `<option value="">-- Select Participant --</option>`;

  const names = Object.keys(participants)
    .sort()
    .map(n => participants[n].name);

  names.forEach(name => {
    const opt = document.createElement("option");
    opt.value = name.toLowerCase();
    opt.textContent = name;
    dropdown.appendChild(opt);
  });
}

function percentChange(a, b) {
  if (a === 0 || a == null || b == null) return "—";
  return (((b - a) / a) * 100).toFixed(0) + "%";
}

function renderSinglePax(p, chartElem, legendElem, tableElem) {
  chartElem.innerHTML = "";
  legendElem.innerHTML = "";
  tableElem.innerHTML = "";

  for (const ex in p.exercises) {
    const vals = p.exercises[ex];
    const max = Math.max(...vals.filter(v => v != null));

    const row = document.createElement("div");
    row.className = "exercise-row";

    const label = document.createElement("div");
    label.className = "exercise-label";
    label.innerHTML = `<span>${ex}</span><span>${vals.join(" → ")}</span>`;
    row.appendChild(label);

    const bars = document.createElement("div");
    bars.className = "bars";

    vals.forEach((v, i) => {
      const bar = document.createElement("div");
      bar.className = "bar date" + (i + 1);
      const height = (v == null || max === 0) ? 0 : (v / max) * 100;
      bar.style.height = `calc(${height}% )`;
      bar.innerHTML = `<span>${v ?? ""}</span>`;
      bars.appendChild(bar);
    });

    row.appendChild(bars);
    chartElem.appendChild(row);
  }

  p.dates.forEach((d, i) => {
    const item = document.createElement("div");
    item.className = "legend-item";
    item.innerHTML = `<div class="legend-color date${i+1}"></div><span>${d}</span>`;
    legendElem.appendChild(item);
  });

  const t = document.createElement("table");
  let html = `
    <thead><tr>
      <th>Exercise</th>
      <th>${p.dates[0]} → ${p.dates[1]}</th>
      ${p.dates[2] ? `<th>${p.dates[1]} → ${p.dates[2]}</th>` : ""}
      <th>Overall (${p.dates[0]} → ${p.dates[p.dates.length-1]})</th>
    </tr></thead><tbody>
  `;

  for (const ex in p.exercises) {
    const v = p.exercises[ex];
    const first = v.length >= 2 ? percentChange(v[0], v[1]) : "—";
    const mid = v.length >= 3 ? percentChange(v[1], v[2]) : "";
    const overall = percentChange(v[0], v[v.length - 1]);

    html += `
      <tr>
        <td>${ex}</td>
        <td>${first}</td>
        ${v[2] ? `<td>${mid}</td>` : ""}
        <td class="highlight">${overall}</td>
      </tr>
    `;
  }

  html += "</tbody>";
  t.innerHTML = html;
  tableElem.appendChild(t);
}

function showParticipant() {
  const input = document.getElementById("participantSelect").value.trim().toLowerCase();
  const msg = document.getElementById("message");
  const chart = document.getElementById("chart");
  const content = document.getElementById("chartContent");
  const legend = document.getElementById("legend");
  const table = document.getElementById("tableContainer");

  msg.textContent = "";
  chart.style.display = "none";
  content.innerHTML = "";
  legend.innerHTML = "";
  table.innerHTML = "";

  if (!participants[input]) {
    msg.textContent = "Participant not found.";
    return;
  }

  const p = participants[input];
  if (p.dates.length < 2) {
    msg.textContent = "Please complete another Pop Tart 300.";
    return;
  }

  document.getElementById("chartTitle").textContent = p.name + " — Improvement Visual";
  chart.style.display = "block";

  renderSinglePax(p, content, legend, table);
}

async function downloadSinglePaxPDF() {
  const { jsPDF } = window.jspdf;
  const pdf = new jsPDF("p", "pt", "letter");

  const chart = document.getElementById("chart");

  if (chart.style.display === "none") {
    alert("Select a participant first.");
    return;
  }

  const canvas = await html2canvas(chart, {
    backgroundColor: "#111",
    scale: 2
  });

  const imgData = canvas.toDataURL("image/png");
  const imgWidth = 550;
  const imgHeight = (canvas.height * imgWidth) / canvas.width;

  pdf.addImage(imgData, "PNG", 30, 30, imgWidth, imgHeight);

  const paxName = document.getElementById("chartTitle").textContent.split("—")[0].trim();

  pdf.save(`PopTart300_${paxName}.pdf`);
}

function showAllPax() {
  const container = document.getElementById("allPaxContainer");
  container.innerHTML = "";

  const paxNames = Object.keys(participants).sort();

  paxNames.forEach(key => {
    const p = participants[key];
    if (!p || p.dates.length === 0) return;

    const wrapper = document.createElement("div");
    wrapper.className = "chart-container";
    wrapper.style.display = "block";
    wrapper.style.marginBottom = "40px";

    const title = document.createElement("h2");
    title.textContent = p.name + " — Improvement Visual";
    wrapper.appendChild(title);

    if (p.dates.length < 2) {
      const msg = document.createElement("div");
      msg.style.color = "#ffeb3b";
      msg.style.textAlign = "center";
      msg.style.marginBottom = "20px";
      msg.textContent = "Please complete another Pop Tart 300.";
      wrapper.appendChild(msg);
      container.appendChild(wrapper);
      return;
    }

    const chartContent = document.createElement("div");
    const legend = document.createElement("div");
    legend.className = "legend";
    const table = document.createElement("div");

    wrapper.appendChild(chartContent);
    wrapper.appendChild(legend);
    wrapper.appendChild(table);

    renderSinglePax(p, chartContent, legend, table);
    container.appendChild(wrapper);
  });
}

async function downloadAllPaxPDF() {
  const { jsPDF } = window.jspdf;
  const pdf = new jsPDF("p", "pt", "letter");

  const container = document.getElementById("allPaxContainer");
  const charts = container.querySelectorAll(".chart-container");

  if (charts.length === 0) {
    alert("No charts to export. Click 'Show Improvement for All PAX' first.");
    return;
  }

  let firstPage = true;

  for (let chart of charts) {
    const canvas = await html2canvas(chart, {
      backgroundColor: "#111",
      scale: 2
    });

    const imgData = canvas.toDataURL("image/png");
    const imgWidth = 550;
    const imgHeight = (canvas.height * imgWidth) / canvas.width;

    if (!firstPage) {
      pdf.addPage();
    }

    pdf.addImage(imgData, "PNG", 30, 30, imgWidth, imgHeight);
    firstPage = false;
  }

  pdf.save("PopTart300_All_PAX.pdf");
}

function showMostImproved() {
  const container = document.getElementById("mostImprovedContainer");
  container.innerHTML = "";

  let scores = [];

  Object.keys(participants).forEach(key => {
    const p = participants[key];
    if (!p || p.dates.length < 2) return;

    let improvements = [];

    for (const ex in p.exercises) {
      const vals = p.exercises[ex];
      if (vals.length >= 2 && vals[0] != null && vals[0] > 0 && vals[vals.length - 1] != null) {
        const pct = ((vals[vals.length - 1] - vals[0]) / vals[0]) * 100;
        improvements.push(pct);
      }
    }

    if (improvements.length > 0) {
      const avgImprovement = improvements.reduce((a, b) => a + b, 0) / improvements.length;
      scores.push({
        name: p.name,
        score: avgImprovement.toFixed(1),
        details: improvements.map(v => v.toFixed(1) + "%")
      });
    }
  });

  scores.sort((a, b) => b.score - a.score);
  const top = scores.slice(0, 5);

  const title = document.createElement("h2");
  title.textContent = "Top 5 Most Improved PAX";
  title.style.textAlign = "center";
  title.style.color = "#ff9800";
  container.appendChild(title);

  top.forEach((p, index) => {
    const card = document.createElement("div");
    card.style.background = "#1c1c1c";
    card.style.padding = "15px";
    card.style.margin = "15px auto";
    card.style.borderRadius = "10px";
    card.style.maxWidth = "600px";
    card.style.boxShadow = "0 0 10px rgba(0,0,0,0.5)";

    card.innerHTML = `
      <h3 style="color:#90caf9; margin-bottom:5px;">
        #${index + 1} — ${p.name}
      </h3>
      <div style="font-size:1.2rem; color:#ffeb3b; margin-bottom:10px;">
        Overall Improvement: <strong>${p.score}%</strong>
      </div>
      <div style="font-size:0.9rem; color:#ccc;">
        Exercise Improvements: ${p.details.join(" | ")}
      </div>
    `;

    container.appendChild(card);
  });
}
</script>

</body>
</html>
